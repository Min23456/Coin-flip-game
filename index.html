<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8"/>
        <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
        <title>Coin Flip Game</title>
        <link rel="stylesheet" href="style.css"/>

    </head>

    <body>
        <div class="container">
            <h1>Coin Flip Guessing Game</h1>
            <p class="subtitle">🍀 Pick heads or tails and test your luck! 🍀</p>
            <div class="buttons">
                <button id="headsBtn">Heads</button>
                <button id="tailsBtn">Tails</button>
            </div>

            <div class="coin-contatiner">
                <div id="coin" class="coin">
                    <div class="front">Heads</div>
                    <div class="back">Tails</div>
                </div>
            </div>

            <div class="result-box">
                <p><strong>Your guess:</strong><span id="guessText">-</span></p>
                <p><strong>Coin result:</strong><span id="coinText">-</span></p>
                <p><strong>Result</strong> <span id="resultText">🧠 🤔Make a guess!🤔 🧠</span></p>
            </div>
            <div class="score-box">
                <p>Wins: <span id="wins">0</span></p>
                <p>Losses: <span id="losses">0</span></p>
            </div>
            <button id="resetBtn" class="reset-btn">Reset score</button>
        </div>
        <script src="script.js"></script>
    </body>
</html>
